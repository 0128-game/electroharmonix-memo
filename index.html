<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Japanese Generator</title>
    <style>
        @font-face {
            font-family: 'MyPseudoFont';
            src: url('Electroharmonix.otf') format('opentype');
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .controls {
            margin-bottom: 20px;
        }

        #memo-area {
            width: 90%;
            max-width: 600px;
            height: 300px;
            background: #111;
            color: #fff;
            font-family: 'MyPseudoFont', sans-serif;
            font-size: 48px;
            padding: 20px;
            border: 2px solid #333;
            text-align: center;
            outline: none;
            resize: none;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }

        button:hover {
            background: #ccc;
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>Size: </label>
        <input type="range" min="20" max="100" value="48" oninput="changeSize(this.value)">
    </div>

    <textarea id="memo-area" spellcheck="false" placeholder="TYPE HERE"></textarea>
    
    <p style="font-size: 12px; color: #666;">※日本語を入力すると普通のフォント（あるいは文字化け）になります</p>

    <script>
        function changeSize(val) {
            document.getElementById('memo-area').style.fontSize = val + 'px';
        }
    </script>

</body>
</html>
